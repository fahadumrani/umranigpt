<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="46" fill="url(#grad2)"/>

  <!-- Outer ring -->
  <circle cx="50" cy="50" r="46" stroke="url(#grad1)" stroke-width="2" fill="none" opacity="0.6"/>

  <!-- Inner decoration ring -->
  <circle cx="50" cy="50" r="38" stroke="url(#grad1)" stroke-width="0.5" fill="none" opacity="0.2" stroke-dasharray="4 4"/>

  <!-- Letter M (UmraniGPT mark) -->
  <path
    d="M28 68 L28 34 L38 34 L50 56 L62 34 L72 34 L72 68 L64 68 L64 46 L52 68 L48 68 L36 46 L36 68 Z"
    fill="url(#grad1)"
    filter="url(#glow)"
  />

  <!-- Accent dots -->
  <circle cx="28" cy="34" r="3" fill="url(#grad1)" opacity="0.8"/>
  <circle cx="72" cy="34" r="3" fill="url(#grad1)" opacity="0.8"/>
  <circle cx="50" cy="56" r="2.5" fill="url(#grad1)" opacity="0.6"/>
</svg>
